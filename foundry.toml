[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings=["@chainlink/contracts/=lib/chainlink/contracts/","@solmate/=lib/solmate/src"]
# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
solc="0.8.19"
fs_permissions = [
    { access = "read", path = "./broadcast" },
    { access = "read", path = "./reports" },
]
ffi=true
[fuzz]
runs=256